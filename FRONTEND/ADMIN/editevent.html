<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Event</title>
    <link rel="stylesheet" href="Addevents.css">
</head>
<body>
    <h1>Edit Event</h1>
    <form class="login-form" id="editEventForm">
        <div class="form-row">
            <label for="Name">Name: </label>
            <input type="text" id="Name" name="Name" required>
        </div>
        <div class="form-row">
            <label for="Department">Department: </label>
            <input type="text" id="Department" name="Department">
        </div>
        <div class="form-row">
            <label for="MainClub">Main Club: </label>
            <input type="text" id="MainClub" name="MainClub">
        </div>
        <div class="form-row">
            <label for="SecondClub">Second Club: </label>
            <input type="text" id="SecondClub" name="SecondClub">
        </div>
        <div class="form-row">
            <label for="ThirdClub">Third Club: </label>
            <input type="text" id="ThirdClub" name="ThirdClub">
        </div>
        <div class="form-row">
            <label for="Adminname">Admin name: </label>
            <input type="text" id="Adminname" name="Adminname" required>
        </div>
        <div class="form-row">
            <label for="AdminPhone">Admin Phone: </label>
            <input type="tel" id="AdminPhone" name="AdminPhone">
        </div>
        <div class="form-row">
            <label for="Description">Description: </label>
            <textarea id="Description" name="Description" rows="4" style="width: 100%; font-size: 18px; font-family: 'Times New Roman', Times, serif;"></textarea>
        </div>
        <div class="form-row">
            <label for="Date">Date: </label>
            <input type="date" id="Date" name="Date">
        </div>
        <div class="form-row">
            <label for="StartTime">Start Time: </label>
            <input type="time" id="StartTime" name="StartTime">
        </div>
        <div class="form-row">
            <label for="EndTime">End Time: </label>
            <input type="time" id="EndTime" name="EndTime">
        </div>
        <div class="form-row">
            <label for="Venue">Venue: </label>
            <input type="text" id="Venue" name="Venue">
        </div>
        <div class="form-row">
            <label for="MaximumParticipants">Maximum Participants: </label>
            <input type="number" id="MaximumParticipants" name="MaximumParticipants">
        </div>
        <div class="button-container">
            <button type="submit" class="btn">Save Changes</button>
            <button type="button" class="btn delete-btn" id="deleteBtn">Delete Event</button>
        </div>
    </form>
